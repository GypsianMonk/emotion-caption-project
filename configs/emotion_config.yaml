model:
  name: "EmotionCNN"
  input_shape: [48, 48, 1]
  num_classes: 7
  classes: ["angry", "disgust", "fear", "happy", "neutral", "sad", "surprise"]
  architecture:
    blocks:
      - filters: 32
        kernel_size: 3
        pool_size: 2
        dropout: 0.25
      - filters: 64
        kernel_size: 3
        pool_size: 2
        dropout: 0.25
      - filters: 128
        kernel_size: 3
        pool_size: 2
        dropout: 0.25
      - filters: 256
        kernel_size: 3
        pool_size: 2
        dropout: 0.25
    dense_units: 512
    dense_dropout: 0.5

training:
  batch_size: 64
  epochs: 60
  learning_rate: 0.001
  optimizer: "adam"
  loss: "categorical_crossentropy"
  metrics: ["accuracy"]
  use_class_weights: true
  early_stopping:
    patience: 10
    monitor: "val_accuracy"
    restore_best_weights: true
  reduce_lr:
    patience: 5
    factor: 0.5
    min_lr: 0.00001
    monitor: "val_loss"

augmentation:
  horizontal_flip: true
  rotation_range: 10
  zoom_range: 0.1
  brightness_range: [0.8, 1.2]
  width_shift_range: 0.1
  height_shift_range: 0.1

paths:
  data_dir: "data/raw/fer2013"
  checkpoint_dir: "checkpoints/emotion"
  log_dir: "logs/emotion"
  export_dir: "exports/emotion"
